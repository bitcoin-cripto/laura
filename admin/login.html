<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<script>if('scrollRestoration' in history) history.scrollRestoration='manual'; window.scrollTo(0,0);</script>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Acceso · Laura Fernández Admin</title>
<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = {
    theme: { extend: {
      colors: { 'sage-dark': '#2d4a5d', sage: '#7aaec4', gold: '#cba96b', earth: '#c4956a' },
      fontFamily: { serif: ['"Cormorant Garamond"', 'Georgia', 'serif'] }
    }}
  }
</script>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
<!-- Supabase JS (anon key — solo para autenticación en el cliente) -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
  body { font-family: 'Inter', sans-serif; }
  .font-serif { font-family: 'Cormorant Garamond', Georgia, serif; }
  #error-box { display: none; }
  #spinner   { display: none; }
</style>
</head>

<body class="min-h-screen bg-gradient-to-br from-slate-100 to-blue-50 flex items-center justify-center p-4">

<div class="w-full max-w-md">

  <!-- Logo / cabecera -->
  <div class="text-center mb-8">
    <p class="font-serif text-4xl text-sage-dark font-light tracking-wide">Laura Fernández</p>
    <p class="text-xs font-semibold tracking-widest text-earth uppercase mt-1">Panel de administración</p>
  </div>

  <!-- Tarjeta de login -->
  <div class="bg-white rounded-2xl shadow-lg border border-gray-100 p-8">

    <h1 class="font-serif text-2xl text-sage-dark font-light mb-6">Iniciar sesión</h1>

    <!-- Error -->
    <div id="error-box"
         class="flex items-start gap-3 bg-red-50 border border-red-200 text-red-700
                rounded-xl px-4 py-3 mb-5 text-sm">
      <span class="text-base mt-0.5">⚠️</span>
      <span id="error-msg"></span>
    </div>

    <form id="form-login" novalidate class="space-y-5">

      <div class="space-y-1.5">
        <label class="block text-xs font-semibold tracking-widest text-gray-400 uppercase">
          Correo electrónico
        </label>
        <input id="email" type="email" autocomplete="username" required
               placeholder=""
               class="w-full rounded-lg border border-gray-200 px-4 py-2.5 text-sm
                      focus:outline-none focus:ring-2 focus:ring-sage/40 focus:border-sage
                      placeholder-gray-300 transition"/>
      </div>

      <div class="space-y-1.5">
        <label class="block text-xs font-semibold tracking-widest text-gray-400 uppercase">
          Contraseña
        </label>
        <div class="relative">
          <input id="password" type="password" autocomplete="current-password" required
                 placeholder=""
                 class="w-full rounded-lg border border-gray-200 px-4 py-2.5 text-sm pr-11
                        focus:outline-none focus:ring-2 focus:ring-sage/40 focus:border-sage
                        placeholder-gray-300 transition"/>
          <!-- Toggle visibilidad -->
          <button type="button" id="btn-toggle-pw"
                  class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-300
                         hover:text-gray-500 transition">
            <svg id="eye-show" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8"
                    d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8"
                    d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7
                       -1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
            </svg>
            <svg id="eye-hide" class="w-5 h-5 hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8"
                    d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7
                       a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878
                       l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59
                       m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0
                       01-4.132 5.411m0 0L21 21"/>
            </svg>
          </button>
        </div>
      </div>

      <button type="submit" id="btn-login"
              class="w-full flex items-center justify-center gap-2 bg-sage-dark hover:bg-sage
                     text-white font-semibold text-sm py-3 rounded-xl transition-colors shadow-sm mt-2">
        <svg id="spinner" class="animate-spin w-4 h-4" fill="none" viewBox="0 0 24 24">
          <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>
          <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8z"/>
        </svg>
        <span id="btn-login-text">Entrar</span>
      </button>

    </form>

  </div>

  <p class="text-center text-xs text-gray-400 mt-6">
    <a href="../index.html" class="hover:text-sage transition-colors">← Volver a la web pública</a>
  </p>

</div>

<script>
// ── Credenciales Supabase (anon/publishable key — segura para el frontend) ──
const SUPABASE_URL = 'https://hdsevxevvwjelhorofqc.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_lFiTdaJuo9MBum9bX_VzGA_zyRNlMZT';

const { createClient } = supabase;
const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// Si ya hay sesión activa, ir directo al dashboard
(async () => {
  const { data: { session } } = await sb.auth.getSession();
  if (session) window.location.replace('./index.html');
})();

// Toggle visibilidad contraseña
const pwInput   = document.getElementById('password');
const eyeShow   = document.getElementById('eye-show');
const eyeHide   = document.getElementById('eye-hide');
document.getElementById('btn-toggle-pw').addEventListener('click', () => {
  const visible = pwInput.type === 'text';
  pwInput.type  = visible ? 'password' : 'text';
  eyeShow.classList.toggle('hidden',  !visible);
  eyeHide.classList.toggle('hidden',   visible);
});

// Error helper
function showError(msg) {
  const box = document.getElementById('error-box');
  document.getElementById('error-msg').textContent = msg;
  box.style.display = 'flex';
}
function hideError() {
  document.getElementById('error-box').style.display = 'none';
}

// Submit
document.getElementById('form-login').addEventListener('submit', async (e) => {
  e.preventDefault();
  hideError();

  const email    = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;

  if (!email || !password) {
    showError('Introduce tu correo y contraseña.');
    return;
  }

  const btn     = document.getElementById('btn-login');
  const spinner = document.getElementById('spinner');
  const label   = document.getElementById('btn-login-text');
  btn.disabled  = true;
  spinner.style.display = 'block';
  label.textContent = 'Comprobando…';

  const { error } = await sb.auth.signInWithPassword({ email, password });

  if (error) {
    showError(error.message === 'Invalid login credentials'
      ? 'Correo o contraseña incorrectos.'
      : error.message);
    btn.disabled = false;
    spinner.style.display = 'none';
    label.textContent = 'Entrar';
    return;
  }

  // Login OK → redirigir al dashboard
  window.location.replace('./index.html');
});
</script>

</body>
</html>
