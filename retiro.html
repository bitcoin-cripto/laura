<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>

<title>Retiro · Laura Fernández No Dualidad</title>
<link rel="icon" href="favicon.ico"/>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400;1,500&family=Dancing+Script:wght@500;600;700&family=Inter:wght@300;400;500;600;700&family=Open+Sans:wght@300;400;500;600&family=Roboto:wght@300;400;500&family=Lato:wght@300;400;700&family=Josefin+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
  :root{
    --sage:#7aaec4; --sage-dark:#2d4a5d; --sage-deep:#1e3347;
    --earth:#a8794f; --earth-deep:#7a5535;
    --cream:#f5f0e8; --cream-warm:#efe6d6;
    --ink:#3a3530; --ink-soft:#6b6258;
    --white:#fdfbf6; --gold:#c9a96e;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:"Inter",sans-serif;background:var(--cream);color:var(--ink);min-height:100vh;
       display:flex;flex-direction:column;}

  /* ── NAV ──────────────────────────────────────────────── */
  .nav{position:fixed;top:0;left:0;right:0;z-index:100;padding:12px clamp(20px,4vw,52px);
       display:flex;align-items:center;justify-content:space-between;
       background:rgba(245,240,232,.92);backdrop-filter:blur(8px);
       box-shadow:0 1px 0 rgba(45,74,93,.1);}
  .nav .logo-img{height:100px;width:auto;display:block;}
  .nav-back{display:inline-flex;align-items:center;gap:.5em;font-family:"Inter",sans-serif;
            font-size:.78rem;letter-spacing:.12em;text-transform:uppercase;font-weight:600;
            color:var(--sage-dark);text-decoration:none;transition:color .3s;}
  .nav-back:hover{color:var(--earth);}
  .nav-back svg{width:16px;height:16px;}

  /* ── HERO — pantalla completa ─────────────────────────── */
  .hero{margin-top:70px;position:relative;height:calc(100vh - 70px);overflow:hidden;background:var(--sage-dark);}
  .hero-img{width:100%;height:100%;object-fit:cover;opacity:.8;}
  .hero-overlay{position:absolute;inset:0;background:linear-gradient(to bottom,transparent 55%,rgba(30,51,71,.4));}

  /* ── CONTENT CARD — bordes redondeados arriba y abajo ─── */
  .wrap{max-width:860px;margin:0 auto;padding:0 clamp(20px,5vw,48px);}
  .content{background:var(--white);border-radius:24px;position:relative;z-index:2;
           margin:40px 0 0;
           padding:clamp(32px,5vw,56px) clamp(24px,5vw,56px) 64px;
           box-shadow:0 8px 48px -12px rgba(45,74,93,.18);}

  /* ── EYEBROW + TÍTULO ─────────────────────────────────── */
  .eyebrow{display:block;font-family:"Inter",sans-serif;font-size:.75rem;letter-spacing:.3em;
           text-transform:uppercase;color:var(--earth);margin-bottom:.7em;}
  h1{font-family:"Inter",sans-serif;font-size:clamp(1.8rem,4.5vw,2.8rem);
     font-weight:700;line-height:1.15;color:var(--sage-dark);margin-bottom:.6em;}

  /* ── META ─────────────────────────────────────────────── */
  .meta{display:flex;flex-wrap:wrap;gap:1.2em 2.5em;margin:1.4em 0 2em;
        padding:1.2em 0;border-top:1px solid var(--cream-warm);border-bottom:1px solid var(--cream-warm);}
  .meta-item{display:flex;flex-direction:column;gap:.2em;}
  .meta-item .k{font-size:.68rem;letter-spacing:.22em;text-transform:uppercase;
                font-weight:700;color:var(--earth);}
  .meta-item .v{font-family:"Inter",sans-serif;font-size:1rem;color:var(--ink);font-weight:500;}

  /* ── PRECIO ───────────────────────────────────────────── */
  .precio-block{display:flex;align-items:center;justify-content:space-between;gap:1em;flex-wrap:wrap;
                background:var(--cream);border:1px solid var(--cream-warm);
                border-radius:12px;padding:.75em 1.4em;margin-bottom:2em;}
  .precio-block .precios{display:inline-flex;align-items:center;gap:.5em;flex-wrap:wrap;}
  .precio-block .precio-lbl,
  .precio-block .reserva-lbl{font-family:"Inter",sans-serif;font-size:.9rem;
                              font-weight:600;color:var(--ink-soft);}
  .precio-block .precio-amt,
  .precio-block .reserva-amt{font-family:"Inter",sans-serif;font-size:.9rem;
                              font-weight:700;color:var(--sage-dark);}
  .precio-block .sep{color:var(--cream-warm);font-size:1.2rem;margin:0 .2em;}

  /* ── DESCRIPCIÓN ──────────────────────────────────────── */
  .desc{font-family:"Inter",sans-serif;font-size:1.05rem;line-height:1.8;
        color:var(--ink-soft);margin-bottom:2em;}
  .desc .ql-align-center  {text-align:center!important;}
  .desc .ql-align-right   {text-align:right!important;}
  .desc .ql-align-justify {text-align:justify!important;}
  .desc .ql-font-arial    {font-family:Arial,Helvetica,sans-serif!important;}
  .desc .ql-font-garamond {font-family:"Cormorant Garamond",Georgia,serif!important;}
  .desc .ql-font-courier  {font-family:"Courier New",monospace!important;}
  .desc .ql-font-georgia  {font-family:Georgia,serif!important;}
  .desc .ql-font-verdana  {font-family:Verdana,sans-serif!important;}
  .desc .ql-font-trebuchet{font-family:"Trebuchet MS",sans-serif!important;}
  .desc .ql-font-inter    {font-family:"Inter",sans-serif!important;}
  .desc .ql-font-opensans {font-family:"Open Sans",sans-serif!important;}
  .desc .ql-font-times    {font-family:"Times New Roman",serif!important;}
  .desc .ql-font-helvetica{font-family:Helvetica,Arial,sans-serif!important;}
  .desc .ql-font-tahoma   {font-family:Tahoma,sans-serif!important;}
  .desc .ql-font-palatino {font-family:Palatino,Georgia,serif!important;}
  .desc .ql-font-impact   {font-family:Impact,sans-serif!important;}
  .desc .ql-font-roboto   {font-family:"Roboto",sans-serif!important;}
  .desc .ql-font-lato     {font-family:"Lato",sans-serif!important;}
  .desc .ql-font-josefin  {font-family:"Josefin Sans",sans-serif!important;}

  /* ── GALERÍA ──────────────────────────────────────────── */
  .galeria{margin:2.5em 0;}
  .galeria h2{font-family:"Inter",sans-serif;font-size:.75rem;letter-spacing:.28em;
              text-transform:uppercase;color:var(--earth);margin-bottom:1em;}
  .galeria-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:10px;}
  .galeria-grid img{width:100%;aspect-ratio:1;object-fit:cover;border-radius:10px;cursor:pointer;
                    transition:transform .25s,box-shadow .25s;}
  .galeria-grid img:hover{transform:scale(1.03);box-shadow:0 8px 24px rgba(0,0,0,.18);}

  /* ── LIGHTBOX ─────────────────────────────────────────── */
  .lb{display:none;position:fixed;inset:0;z-index:999;background:rgba(0,0,0,.88);
      align-items:center;justify-content:center;}
  .lb.open{display:flex;}
  .lb img{max-width:90vw;max-height:88vh;border-radius:8px;object-fit:contain;}
  .lb-close{position:absolute;top:18px;right:22px;background:none;border:none;
            color:#fff;font-size:2.2rem;cursor:pointer;line-height:1;opacity:.8;}
  .lb-close:hover{opacity:1;}

  /* ── BOTONES ──────────────────────────────────────────── */
  .cta{display:flex;gap:16px;flex-wrap:wrap;margin-top:2.5em;}
  .btn{display:inline-flex;align-items:center;gap:.55em;cursor:pointer;
       font-family:"Inter",sans-serif;font-size:1rem;letter-spacing:.06em;
       font-weight:600;padding:.85em 2em;border:none;border-radius:40px;text-decoration:none;
       transition:transform .3s,background .3s,color .3s,box-shadow .3s;}
  .btn-earth{background:var(--earth);color:#fff;box-shadow:0 10px 26px -12px rgba(168,121,79,.7);}
  .btn-earth:hover{background:var(--earth-deep);transform:translateY(-2px);}
  .btn-ghost{background:transparent;color:var(--sage-dark);border:1.5px solid var(--sage-dark);}
  .btn-ghost:hover{background:var(--sage-dark);color:#fff;}

  /* ── SKELETON ─────────────────────────────────────────── */
  .skeleton{background:linear-gradient(90deg,#e8e0d4 25%,#f0e8df 50%,#e8e0d4 75%);
            background-size:200% 100%;animation:shimmer 1.4s infinite;border-radius:8px;}
  @keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
  .sk-title{height:48px;width:70%;margin-bottom:16px;}
  .sk-line{height:16px;margin-bottom:10px;}
  .sk-line.w60{width:60%;}
  .sk-line.w40{width:40%;}

  /* ── ERROR ────────────────────────────────────────────── */
  .error-box{text-align:center;padding:80px 24px;}
  .error-box h2{font-family:"Inter",sans-serif;font-size:2rem;color:var(--sage-dark);margin-bottom:.5em;}
  .error-box p{color:var(--ink-soft);margin-bottom:2em;}

  /* ── BRUSH (borde irregular antes del footer) ─────────── */
  .brush{display:block;line-height:0;overflow:hidden;}

  /* ── FOOTER ───────────────────────────────────────────── */
  .site-footer{background:var(--sage-dark);color:rgba(253,251,246,.78);padding:56px 0 40px;margin-top:0;}
  .foot-grid{display:flex;flex-direction:column;align-items:center;text-align:center;gap:6px;}
  .foot-logo{font-family:"Dancing Script",cursive;font-weight:700;font-size:2.8rem;color:var(--gold);}
  .foot-tag{font-size:.95rem;font-style:italic;color:rgba(253,251,246,.85);
            font-weight:500;line-height:1.6;}
  .foot-legal{display:flex;gap:20px;flex-wrap:wrap;justify-content:center;margin:18px 0 6px;}
  .foot-legal a{font-family:"Inter",sans-serif;font-size:.58rem;letter-spacing:.12em;
                text-transform:uppercase;font-weight:500;color:rgba(253,251,246,.45);
                text-decoration:none;transition:color .3s ease;}
  .foot-legal a:hover{color:var(--gold);}
  .foot-social{display:flex;gap:22px;margin:14px 0 2px;align-items:center;justify-content:center;}
  .foot-social a{color:rgba(253,251,246,.65);transition:color .3s ease,transform .3s ease;display:inline-flex;}
  .foot-social a:hover{color:var(--gold);transform:translateY(-3px);}
  .foot-social svg{width:22px;height:22px;fill:currentColor;}
  .foot-copyright{font-family:"Inter",sans-serif;font-size:.72rem;letter-spacing:.08em;
                  color:rgba(253,251,246,.5);margin-top:4px;}

  /* ── WhatsApp flotante ─────────────────────────────────── */
  .whatsapp-btn{
    position:fixed;bottom:24px;right:24px;z-index:200;
    width:48px;height:48px;border-radius:50%;
    background:#4eba6f;
    display:flex;align-items:center;justify-content:center;
    opacity:.82;
    box-shadow:0 2px 10px rgba(0,0,0,.15);
    transition:opacity .35s ease;
    text-decoration:none;
  }
  .whatsapp-btn:hover{opacity:1;}
  .whatsapp-btn svg{width:24px;height:24px;fill:#fff;}
  @media(max-width:640px){
    .whatsapp-btn{width:44px;height:44px;}
    .whatsapp-btn svg{width:22px;height:22px;}
  }
</style>
</head>

<script>
const SB_URL = 'https://hdsevxevvwjelhorofqc.supabase.co';
const SB_KEY = 'sb_publishable_lFiTdaJuo9MBum9bX_VzGA_zyRNlMZT';

function formatFecha(inicio, fin) {
  if (!inicio) return '';
  const loc = 'es-ES';
  const d1  = new Date(inicio + 'T12:00:00');
  const fmt  = { day:'numeric', month:'long', year:'numeric' };
  const fmtM = { day:'numeric', month:'long' };
  if (!fin || fin === inicio) return d1.toLocaleDateString(loc, fmt);
  const d2 = new Date(fin + 'T12:00:00');
  if (d1.getFullYear() === d2.getFullYear() && d1.getMonth() === d2.getMonth())
    return `${d1.getDate()} – ${d2.toLocaleDateString(loc, fmt)}`;
  return `${d1.toLocaleDateString(loc, fmtM)} – ${d2.toLocaleDateString(loc, fmt)}`;
}

function renderRetiro(r) {
  if (r.imagen_portada) {
    const img = document.getElementById('hero-img');
    img.src = r.imagen_portada;
    img.style.display = 'block';
  }
  document.title = `${r.titulo} · Laura Fernández No Dualidad`;

  // Precio — mismo tamaño para importe y reserva
  const precioStr  = r.precio         != null ? Number(r.precio).toLocaleString('es-ES')         + '€' : '';
  const reservaStr = r.precio_reserva != null ? Number(r.precio_reserva).toLocaleString('es-ES') + '€' : '';
  const reservaBtn = r.stripe_url
    ? `<a href="${r.stripe_url}" target="_blank" rel="noopener" class="btn btn-earth">Reservar plaza</a>`
    : `<a href="index.html#contacto" class="btn btn-earth">Reservar plaza</a>`;

  const precioHtml = precioStr
    ? `<div class="precio-block">
        <span class="precios">
          <span class="precio-lbl">Precio:</span>
          <span class="precio-amt">${precioStr}</span>
          ${reservaStr
            ? `<span class="sep">|</span><span class="reserva-lbl">Reserva:</span><span class="reserva-amt">${reservaStr}</span>`
            : ''}
        </span>
        ${reservaBtn}
       </div>`
    : '';

  // Meta — fechas
  const fmt = { day:'numeric', month:'long', year:'numeric' };
  const loc = 'es-ES';
  let metaHtml = '';
  if (r.fecha_inicio) {
    const d1str = new Date(r.fecha_inicio + 'T12:00:00').toLocaleDateString(loc, fmt);
    if (r.fecha_fin && r.fecha_fin !== r.fecha_inicio) {
      const d2str = new Date(r.fecha_fin + 'T12:00:00').toLocaleDateString(loc, fmt);
      metaHtml += `<div class="meta-item"><span class="k">Fecha inicio</span><span class="v">${d1str}</span></div>`;
      metaHtml += `<div class="meta-item"><span class="k">Fecha fin</span><span class="v">${d2str}</span></div>`;
    } else {
      metaHtml += `<div class="meta-item"><span class="k">Fecha</span><span class="v">${d1str}</span></div>`;
    }
  }
  if (r.lugar) metaHtml += `<div class="meta-item"><span class="k">Lugar</span><span class="v">${r.lugar}</span></div>`;
  if (r.tipo)  metaHtml += `<div class="meta-item"><span class="k">Modalidad</span><span class="v">${r.tipo === 'presencial' ? 'Presencial' : 'Online'}</span></div>`;

  // Galería
  let galeriaHtml = '';
  if (r.galeria_imagenes?.length) {
    const imgs = r.galeria_imagenes.map((url, i) =>
      `<img src="${url}" alt="Imagen ${i+1} del retiro" loading="lazy" onclick="abrirLb('${url}')">`
    ).join('');
    galeriaHtml = `<div class="galeria"><h2>Galería de imágenes</h2><div class="galeria-grid">${imgs}</div></div>`;
  }

  document.getElementById('skeleton').style.display = 'none';
  document.getElementById('retiro-body').style.display = 'block';
  document.getElementById('retiro-body').innerHTML = `
    <span class="eyebrow">${r.tipo === 'presencial' ? 'Retiro presencial' : 'Retiro online'}</span>
    <h1>${r.titulo}</h1>
    ${metaHtml ? `<div class="meta">${metaHtml}</div>` : ''}
    ${precioHtml}
    <div class="desc">${r.descripcion_larga || (r.descripcion_corta ? `<p>${r.descripcion_corta}</p>` : '')}</div>
    ${galeriaHtml}
    <div class="cta">
      <a href="index.html#retiros" class="btn btn-ghost">Ver todos los retiros</a>
    </div>
  `;
}

function mostrarError(msg) {
  document.getElementById('skeleton').style.display = 'none';
  document.getElementById('retiro-body').style.display = 'block';
  document.getElementById('retiro-body').innerHTML = `
    <div class="error-box">
      <h2>Retiro no encontrado</h2>
      <p>${msg}</p>
      <a href="index.html#retiros" class="btn btn-ghost">Ver todos los retiros</a>
    </div>`;
}

// Lightbox
function abrirLb(src) {
  document.getElementById('lb-img').src = src;
  document.getElementById('lb').classList.add('open');
  document.body.style.overflow = 'hidden';
}
document.getElementById('lb-close').addEventListener('click', () => {
  document.getElementById('lb').classList.remove('open');
  document.body.style.overflow = '';
});
document.getElementById('lb').addEventListener('click', e => {
  if (e.target === e.currentTarget) {
    document.getElementById('lb').classList.remove('open');
    document.body.style.overflow = '';
  }
});
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    document.getElementById('lb').classList.remove('open');
    document.body.style.overflow = '';
  }
});

// Cargar retiro
(async () => {
  const id = new URLSearchParams(window.location.search).get('id');
  if (!id) { mostrarError('No se ha especificado ningún retiro.'); return; }
  try {
    const res = await fetch(
      `${SB_URL}/rest/v1/retiros?id=eq.${encodeURIComponent(id)}&select=*&limit=1`,
      { headers: { apikey: SB_KEY, Authorization: `Bearer ${SB_KEY}` } }
    );
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    if (!data.length) { mostrarError('Este retiro no existe o ha sido eliminado.'); return; }
    renderRetiro(data[0]);
  } catch(e) {
    mostrarError('No se pudo cargar la información del retiro.');
    console.error(e);
  }
})();
</script>
